# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
"on":
  push:
    branches:
      - master
concurrency:
  group: firebase-ci-cd-queue
  cancel-in-progress: false
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Install workspace dependencies
        run: |
          npm install --workspace=functions
          npm install --workspace=public

      - name: Build functions
        run: npm run --workspace=functions build

      - name: Build public assets (SCSS + HTML)
        run: npm run --workspace=public build

      - name: Deploy Firebase Functions
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FURKANTUNALI_1043 }}
        run: |
          set -euo pipefail
          echo "$SERVICE_ACCOUNT_JSON" > /tmp/firebase-sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json npx firebase-tools@14.3.0 deploy --only functions --project furkantunali-1043 --force --non-interactive --debug
          rm -f /tmp/firebase-sa.json

      - name: Deploy Cloudflare Worker (cv.pdf proxy)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          npx wrangler@4 deploy --config cloudflare-workers/cv-pdf/wrangler.toml --no-bundle

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_FURKANTUNALI_1043 }}"
          channelId: live
          projectId: furkantunali-1043
